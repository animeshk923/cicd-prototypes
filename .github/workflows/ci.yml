name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "24", cache: "npm" }
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --colors
        env:
          FORCE_COLOR: 3

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: matrix.node-version
          cache: "npm"
      - run: npm ci
      - run: npm test -- --colors
        env:
          FORCE_COLOR: 3

  build:
    needs: [lint-and-typecheck, test-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "24", cache: "npm" }
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v8
        with:
          name: dist
          path: dist/

  deploy-staging:
    nees: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.coolapp.com
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Deploy to staging
        run: echo "Deploting to staging (simulated)"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://coolapp.com
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Deploy to production
        run: echo "Deploying to production (simulated)"
